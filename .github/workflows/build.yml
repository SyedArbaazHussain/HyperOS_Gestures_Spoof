name: Build and Release Signed APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # We disable the setup-java cache to let the specialized Gradle action handle it better
          cache: ''

      - name: Setup Gradle
        # Modern replacement for gradle-build-action
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          # Fixes the 'Caching disabled due to pre-existing home' error
          cache-overwrite-existing: true

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Build with Gradle
        # Running via shell is the new standard to avoid 'arguments' deprecation
        run: ./gradlew assembleRelease

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.sign_app.outputs.signedReleaseFile }}
          name: HyperOS Gesture Fix ${{ github.ref_name }}
          body: |
            ### Automated Release
            - Built with modern `setup-gradle` action
            - Optimized for HyperOS 3.0 (Poco F7)
            - Includes persistent boot-fix logic
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: HyperOS_Gesture_Fix_Build
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}